<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agregar Tarjeta - Sauzal</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
<style data-purpose="layout-styles">
    .iphone-frame {
      max-width: 415px;
      height: 852px;
      margin: 20px auto;
      position: relative;
      overflow: hidden;
      border-radius: 40px;
      box-shadow: 0 0 0 10px #1a1a1a, 0 20px 50px rgba(0,0,0,0.2);
      background: white;
    }
    .status-bar {
      height: 44px;
      padding: 0 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      font-weight: 600;
    }
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(2px);
      z-index: 10;
    }
    .bottom-sheet {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: white;
      border-top-left-radius: 32px;
      border-top-right-radius: 32px;
      padding: 32px 24px 44px 24px;
      z-index: 20;
    }
    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 134px;
      height: 5px;
      background: #c2c2c2;
      border-radius: 100px;
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
<!-- BEGIN: Device Frame -->
<div class="iphone-frame">
<!-- BEGIN: Status Bar -->
<div class="status-bar">
<span>9:41</span>
<div class="flex gap-1 items-center">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" fill-rule="evenodd"></path></svg>
<div class="w-6 h-3 border border-black rounded-sm relative">
<div class="absolute inset-0.5 bg-black w-4"></div>
</div>
</div>
</div>
<!-- END: Status Bar -->
<!-- BEGIN: Background Content (Screen "Pago") -->
<div class="p-6 opacity-40">
<div class="flex justify-between items-start mb-8">
<div class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center">
<svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
<div class="text-center">
<p class="text-sm text-gray-400 font-medium">Sauzal</p>
<h1 class="text-xl font-bold text-gray-800">Pago</h1>
</div>
<div class="w-10 h-10 flex items-center justify-center">
<svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
</div>
<div class="mt-12 flex flex-col items-center text-center">
<!-- Wallet Icon Placeholder -->
<div class="mb-6">
<div class="relative w-24 h-16 bg-[#D17D66] rounded-lg shadow-md">
<div class="absolute top-2 left-0 w-full h-4 bg-[#6EB1C5] opacity-80"></div>
<div class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-6 bg-[#B56754] rounded"></div>
</div>
</div>
<h2 class="text-lg font-bold text-gray-700 mb-2">No tienes ninguna tarjeta</h2>
<p class="text-sm text-gray-400 px-8 mb-8">Por favor agrega una tarjeta de crédito o débito para realizar tu orden</p>
<button class="flex items-center text-[#EAB308] font-semibold gap-2">
<span class="text-xl">+</span> Agregar tarjeta
        </button>
</div>
</div>
<!-- END: Background Content -->
<!-- BEGIN: Overlay -->
<div class="overlay"></div>
<!-- END: Overlay -->
<!-- BEGIN: Modal Bottom Sheet -->
<div class="bottom-sheet shadow-2xl">
<div class="text-center mb-8">
<h3 class="text-lg font-semibold text-gray-800">Agregar tarjeta</h3>
</div>
<form class="space-y-4" id="add-card-form">
<!-- Card Number Field -->
<div class="relative">
<input class="w-full p-4 pr-16 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-gray-700 placeholder-gray-400" data-purpose="card-number-input" placeholder="Número de tarjeta" type="text"/>
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex">
<!-- Mastercard Logo Representation -->
<div class="w-6 h-6 bg-[#EB001B] rounded-full mix-blend-multiply"></div>
<div class="w-6 h-6 bg-[#F79E1B] rounded-full -ml-3 mix-blend-multiply"></div>
</div>
</div>
<!-- Cardholder Name Field -->
<div>
<input class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-gray-700 placeholder-gray-400" placeholder="Nombre en la tarjeta" type="text"/>
</div>
<!-- Row for Expiry and CVV -->
<div class="grid grid-cols-2 gap-4">
<input class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-gray-700 placeholder-gray-400" placeholder="Fecha de exp." type="text"/>
<input class="w-full p-4 border border-gray-200 rounded-2xl focus:ring-2 focus:ring-green-500 focus:border-transparent outline-none text-gray-700 placeholder-gray-400" placeholder="CVV" type="password"/>
</div>
<!-- Submit Button -->
<div class="pt-8">
<button class="w-full bg-[#00703C] hover:bg-[#005a30] transition-colors text-white py-4 rounded-2xl font-bold text-lg" data-purpose="submit-button" type="button">
            Agregar tarjeta
          </button>
</div>
</form>
<!-- Home Indicator -->
<div class="home-indicator"></div>
</div>
<!-- END: Modal Bottom Sheet -->
</div>
<!-- END: Device Frame -->
</body></html>
