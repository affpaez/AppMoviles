<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-typography">
    /* Custom font colors to match the image accurately */
    .text-brand-dark {
      color: #313351;
    }
    .text-brand-muted {
      color: #8C8EAC;
    }
    .bg-brand-green {
      background-color: #006D3E;
    }
  </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
<!-- BEGIN: MobileDeviceContainer -->
<!-- Mimicking the mobile viewport provided in the image -->
<main class="w-[415px] h-[852px] bg-white rounded-[50px] shadow-2xl overflow-hidden relative border-[8px] border-white flex flex-col">
<!-- BEGIN: StatusBar -->
<header class="w-full px-8 pt-4 flex justify-between items-center text-sm font-semibold" data-purpose="status-bar">
<div id="status-time">9:41</div>
<div class="flex items-center space-x-1.5">
<!-- Signal, WiFi, Battery Icons -->
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path d="M2 11h2v5H2v-5zm4-3h2v8H6V8zm4-3h2v11h-2V5zm4-3h2v14h-2V2z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7a1.414 1.414 0 012-2l5 5 5-5a1.414 1.414 0 011.414 2z" fill-rule="evenodd"></path></svg>
<div class="w-6 h-3 border border-black rounded-sm relative">
<div class="absolute inset-0.5 bg-black w-3"></div>
</div>
</div>
</header>
<!-- END: StatusBar -->
<!-- BEGIN: MainContent -->
<section class="flex-grow flex flex-col px-10 pt-24" data-purpose="login-form-container">
<!-- Welcome Header -->
<div class="text-center mb-16">
<h1 class="text-2xl font-bold text-brand-dark mb-4">
          Hola de nuevo! ✌️
        </h1>
<p class="text-brand-muted text-[17px] leading-relaxed">
          Inicia sesión para vivir la experiencia completa.
        </p>
</div>
<!-- Form Fields -->
<div class="space-y-6">
<!-- Username Field -->
<div class="relative">
<input class="w-full h-16 px-6 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent text-brand-dark placeholder:text-brand-muted outline-none transition-all shadow-sm" placeholder="Nombre de usuario o correo electrónico" type="text"/>
</div>
<!-- Password Field -->
<div class="relative">
<input class="w-full h-16 px-6 rounded-2xl border border-gray-200 focus:ring-2 focus:ring-green-500 focus:border-transparent text-brand-dark placeholder:text-brand-muted outline-none transition-all shadow-sm" placeholder="Contraseña" type="password"/>
<!-- Password Visibility Toggle Icon -->
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-brand-muted">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
</div>
</section>
<!-- END: MainContent -->
<!-- BEGIN: FooterActions -->
<footer class="p-10 pb-12 space-y-8">
<!-- Submit Button -->
<button class="w-full h-16 bg-brand-green text-white font-semibold text-lg rounded-2xl active:scale-95 transition-transform" type="submit">
        Siguiente
      </button>
<!-- iOS Home Indicator -->
<div class="flex justify-center">
<div class="w-32 h-1.5 bg-black rounded-full"></div>
</div>
</footer>
<!-- END: FooterActions -->
</main>
<!-- END: MobileDeviceContainer -->
</body></html>
