<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirmación QR - Todo Listo</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="typography">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="layout-custom">
    /* Custom background to match the subtle off-white/gray gradient in the image */
    .bg-ios-gray {
      background-color: #FAFAFA;
    }
    /* Styles for the QR scanner corner brackets */
    .qr-corner {
      width: 24px;
      height: 24px;
      border-color: #FFB84D; /* Orange color from image */
      border-width: 3px;
      position: absolute;
    }
    .corner-tl { top: -10px; left: -10px; border-right: 0; border-bottom: 0; border-radius: 8px 0 0 0; }
    .corner-tr { top: -10px; right: -10px; border-left: 0; border-bottom: 0; border-radius: 0 8px 0 0; }
    .corner-bl { bottom: -10px; left: -10px; border-right: 0; border-top: 0; border-radius: 0 0 0 8px; }
    .corner-br { bottom: -10px; right: -10px; border-left: 0; border-top: 0; border-radius: 0 0 8px 0; }
    
    /* The scanning animation line */
    .scan-line {
      height: 3px;
      background: linear-gradient(to right, transparent, #FFB84D, transparent);
      box-shadow: 0 0 8px #FFB84D;
      position: absolute;
      width: 110%;
      left: -5%;
      top: 35%;
      z-index: 10;
    }
  </style>
</head>
<body class="bg-ios-gray min-h-screen flex flex-col items-center justify-between antialiased">
<!-- BEGIN: Status Bar -->
<header class="w-full max-w-md px-8 pt-4 flex justify-between items-center" data-purpose="status-bar">
<!-- Time -->
<div class="text-sm font-bold text-gray-900">9:41</div>
<!-- Icons -->
<div class="flex space-x-1.5 items-end">
<svg class="w-4 h-4 text-black" fill="currentColor" viewbox="0 0 24 24"><path d="M12 21l-12-18h24z"></path></svg> <!-- Cellular -->
<svg class="w-4 h-4 text-black" fill="currentColor" viewbox="0 0 24 24"><path d="M12 6c3.13 0 5.92 1.44 7.76 3.69L12 21 4.24 9.69C6.08 8.25 8.87 6.81 12 6.81z"></path></svg> <!-- Wifi -->
<svg class="w-6 h-3 text-black" fill="currentColor" viewbox="0 0 24 24"><path d="M17 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z M21 10h2v4h-2V10z"></path></svg> <!-- Battery -->
</div>
</header>
<!-- END: Status Bar -->
<!-- BEGIN: Main Header -->
<nav class="w-full max-w-md px-8 pt-8 flex justify-end" data-purpose="navigation">
<button aria-label="Menu" class="p-2 text-gray-700">
<svg fill="none" height="18" viewbox="0 0 24 18" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M0 1.5H24M0 9H24M0 16.5H24" stroke="#2D3748" stroke-linecap="round" stroke-width="2.5"></path>
</svg>
</button>
</nav>
<!-- END: Main Header -->
<!-- BEGIN: Content Section -->
<main class="flex-grow w-full max-w-md flex flex-col items-center justify-center px-8 text-center" data-purpose="qr-display">
<h1 class="text-[#2D3748] text-2xl font-bold mb-16">Todo listo!</h1>
<!-- QR Code Container -->
<div class="relative mb-16 p-4" data-purpose="qr-container">
<!-- Orange Scan Brackets -->
<div class="qr-corner corner-tl"></div>
<div class="qr-corner corner-tr"></div>
<div class="qr-corner corner-bl"></div>
<div class="qr-corner corner-br"></div>
<!-- Scan Line Effect -->
<div class="scan-line"></div>
<!-- QR Code Image -->
<!-- The image provided is used as the base, however for the QR specifically I'm referencing the center of it -->
<div class="relative w-52 h-52 bg-white flex items-center justify-center rounded-lg overflow-hidden">
<!-- Using a visual representation of the QR from the prompt -->
<img alt="QR Code" class="w-full h-full object-cover scale-[1.8] opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAc9-fsmTkJfBHO71Q1CEwnYLhDxPJS_qiBfDM3TkJhLbjZZyGkLa2nM5AheRz0lim-fWUeBPuLyT0tHAi_0Q2KdtrS1UBQx4iDk7nLCT_uE0MNhn9msY0zD4e5kZfhYPCfSY6XNN4EIwcXgRCkaEbs_jNHQLbl1KRP6-SMmsMWH5gd3Xppc5EelNvjHkhPwydkj_KOsuuQnzv3CyZESZCHdxtyd47O6BQC63WUqtzNY_DLW9z98LdwSLgRySQRmNF61VAfl_c0hZvx" style="object-position: center 38%;"/>
<!-- Overlay to dim the bottom half as seen in reference -->
<div class="absolute bottom-0 left-0 right-0 h-[65%] bg-white/40 pointer-events-none"></div>
</div>
</div>
<p class="text-[#8E99AF] text-base leading-relaxed max-w-[260px]">
      Por favor escanea este código QR para recibir tu pedido.
    </p>
</main>
<!-- END: Content Section -->
<!-- BEGIN: Bottom Action Area -->
<footer class="w-full max-w-md px-8 pb-4" data-purpose="footer-actions">
<!-- Action Button -->
<button class="w-full bg-[#006D3C] hover:bg-[#005a32] text-white font-semibold py-4 rounded-2xl transition-colors duration-200 shadow-sm" data-purpose="exit-button">
      Salir
    </button>
<!-- iOS Home Indicator -->
<div class="flex justify-center mt-8 mb-2">
<div class="w-32 h-1.5 bg-black rounded-full opacity-90"></div>
</div>
</footer>
<!-- END: Bottom Action Area -->
</body></html>
