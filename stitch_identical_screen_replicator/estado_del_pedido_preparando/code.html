<style data-purpose="typography">

    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8F9FA;
    }
    .text-brand-gray { color: #6B7280; }
    .text-brand-dark { color: #1F2937; }
    .text-brand-yellow { color: #FBBF24; }
  </style>
<style data-purpose="layout-custom">

    .ios-card {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
      border-radius: 24px;
    }
    .orbit-container {
      position: relative;
      height: 280px;
      overflow: hidden;
    }
    .orbit-circle {
      position: absolute;
      border: 1px solid #D1FAE5;
      border-radius: 50%;
      left: 50%;
      transform: translateX(-50%);
    }
    .orbit-1 { width: 340px; height: 340px; top: 20px; }
    .orbit-2 { width: 220px; height: 220px; top: 80px; }
    
    /* Decorative dots on orbits */
    .dot {
      position: absolute;
      width: 6px;
      height: 6px;
      background-color: #FBBF24;
      border-radius: 50%;
    }
  </style>
