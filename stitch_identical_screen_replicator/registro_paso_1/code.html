<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Registro</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for a clean, modern iOS-like look -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
<style data-purpose="custom-layout">
    /* Subtle background and container styles to mimic the provided image's soft shadows and depth */
    .ios-card {
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }
    .input-shadow {
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
    }
  </style>
</head>
<body class="bg-[#F9FAFB] flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: MobileDeviceContainer -->
<main class="bg-white w-full max-w-[415px] h-[852px] rounded-[50px] relative overflow-hidden ios-card border-[8px] border-white flex flex-col">
<!-- BEGIN: StatusBar -->
<header class="flex justify-between items-center px-8 pt-6 pb-2 text-black w-full" data-purpose="ios-status-bar">
<div class="font-semibold text-[15px]">9:41</div>
<div class="flex items-center space-x-1.5">
<!-- Signal Icons Mockup -->
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path d="M2 11h2v5H2v-5zm4-3h2v8H6V8zm4-3h2v11h-2V5zm4-3h2v14h-2V2z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M17.707 15.707a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414l3-3a1 1 0 111.414 1.414L15.414 12l2.293 2.293a1 1 0 010 1.414z" fill-rule="evenodd"></path><path clip-rule="evenodd" d="M12 4a8 8 0 100 16 8 8 0 000-16zM4 12a8 8 0 1116 0 8 8 0 01-16 0z" fill-rule="evenodd"></path></svg>
<!-- Battery Icon Mockup -->
<div class="border-[1.5px] border-black/30 rounded-[3px] w-6 h-3 relative">
<div class="bg-black absolute left-[1px] top-[1px] bottom-[1px] w-[80%] rounded-[1px]"></div>
</div>
</div>
</header>
<!-- END: StatusBar -->
<!-- BEGIN: ContentArea -->
<section class="flex-1 flex flex-col items-center px-8 pt-12" data-purpose="registration-form-container">
<!-- Welcome Header -->
<div class="text-center mb-10">
<h1 class="text-[#374151] text-2xl font-bold mb-3 flex items-center justify-center gap-2">
          ¡Bienvenido! <span>✌️</span>
</h1>
<p class="text-[#6B7280] text-[15px] leading-relaxed px-4">
          ¡Parece que eres nuevo por aquí! Crea una cuenta para disfrutar de una experiencia completa.
        </p>
</div>
<!-- Registration Form -->
<form class="w-full space-y-4" data-purpose="onboarding-form">
<!-- Field: Nombre -->
<div class="relative">
<input class="w-full h-[58px] px-5 rounded-2xl border-gray-200 bg-white text-gray-700 placeholder-gray-400 focus:ring-1 focus:ring-green-700 focus:border-green-700 transition-all input-shadow" placeholder="Nombre" type="text"/>
</div>
<!-- Field: Correo electrónico -->
<div class="relative">
<input class="w-full h-[58px] px-5 rounded-2xl border-gray-200 bg-white text-gray-700 placeholder-gray-400 focus:ring-1 focus:ring-green-700 focus:border-green-700 transition-all input-shadow" placeholder="Correo electrónico" type="email"/>
</div>
<!-- Field: Celular -->
<div class="relative flex items-center h-[58px] w-full rounded-2xl border border-gray-200 bg-white px-4 input-shadow">
<!-- Country Selector Mockup -->
<button class="flex items-center space-x-2 border-r border-gray-200 pr-3 mr-3 focus:outline-none" data-purpose="country-picker" type="button">
<img alt="México" class="w-6 h-4 object-cover rounded-[2px]" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBndpCESh00vRdaKPUSamHl2RwnuawevGilldECdvao-TkTTcSmJMQ4-NYUqGGfoDcYXg4qtrrROMC86gbpi9yIOohVyEGWKsqYVWEHOk2h4XL-PnbklaiUS-Ov6R4zGX_jmJTWbKGHgSqI1cAzbI9f26tG36Q0Oaf3EmR_ju76guPABBpxQj5YwqFXL8zaln5c8ptmtLwaR8Se6h4wNdqpG4bvKbDgYzgOmOh4_ie-9uzaLXvN8ylf8MLlT7WY3ppIfzvRJQ5fWvhn"/>
<svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</button>
<input class="flex-1 border-none bg-transparent p-0 text-gray-700 placeholder-gray-400 focus:ring-0" placeholder="Celular" type="tel"/>
</div>
<!-- Field: Contraseña -->
<div class="relative">
<input class="w-full h-[58px] px-5 pr-14 rounded-2xl border-gray-200 bg-white text-gray-700 placeholder-gray-400 focus:ring-1 focus:ring-green-700 focus:border-green-700 transition-all input-shadow" placeholder="Contraseña" type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600" data-purpose="toggle-password-visibility" type="button">
<!-- Eye Icon (Visibility Off) -->
<svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24">
<path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l18 18" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
</button>
</div>
<!-- Submit Button -->
<div class="pt-16">
<button class="w-full h-[60px] bg-[#006D32] hover:bg-[#005a29] text-white font-semibold text-lg rounded-2xl shadow-lg shadow-green-900/10 active:scale-[0.98] transition-transform" type="submit">
            Siguiente
          </button>
</div>
</form>
</section>
<!-- END: ContentArea -->
<!-- BEGIN: HomeIndicator -->
<footer class="pb-3 flex justify-center w-full" data-purpose="ios-home-indicator">
<div class="w-32 h-1.5 bg-[#1F2937] rounded-full"></div>
</footer>
<!-- END: HomeIndicator -->
</main>
<!-- END: MobileDeviceContainer -->
</body></html>
