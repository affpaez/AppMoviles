<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pantalla de Pago - Sauzal</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter for clean typography -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<style data-purpose="typography">
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
<style data-purpose="custom-layout">
    /* Custom styles for the credit card pattern */
    .card-gradient-bg {
      background: linear-gradient(135deg, #2D2E3E 0%, #1C1D2A 100%);
      position: relative;
      overflow: hidden;
    }
    .card-circle-pattern {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      bottom: -100px;
      right: -50px;
    }
    .card-circle-pattern-inner {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      top: -20px;
      left: -20px;
    }
  </style>
</head>
<body class="bg-gray-50 flex justify-center items-start min-h-screen">
<!-- BEGIN: MobileContainer -->
<main class="w-full max-w-[415px] bg-white min-h-[852px] shadow-2xl relative flex flex-col overflow-hidden">
<!-- BEGIN: StatusBar -->
<div class="flex justify-between items-center px-8 py-3 text-sm font-semibold" data-purpose="ios-status-bar">
<span>9:41</span>
<div class="flex space-x-1.5 items-center">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path d="M2 11h2v5H2v-5zm4-3h2v8H6V8zm4-4h2v12h-2V4zm4-3h2v15h-2V1z"></path></svg>
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M17.707 14.707a1 1 0 01-1.414 0l-7-7a1 1 0 011.414-1.414l7 7a1 1 0 010 1.414z" fill-rule="evenodd"></path><path clip-rule="evenodd" d="M10 2a8 8 0 100 16 8 8 0 000-16zM5 10a5 5 0 1110 0 5 5 0 01-10 0z" fill-rule="evenodd"></path></svg>
<div class="w-6 h-3 border border-black rounded-sm relative">
<div class="absolute inset-0.5 bg-black w-4"></div>
</div>
</div>
</div>
<!-- END: StatusBar -->
<!-- BEGIN: Header -->
<header class="px-6 pt-4 pb-2" data-purpose="main-header">
<div class="flex justify-between items-center">
<!-- Back Button -->
<button aria-label="Volver" class="p-3 bg-white border border-gray-100 rounded-xl shadow-sm">
<svg class="h-5 w-5 text-gray-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M10 19l-7-7m0 0l7-7m-7 7h18" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<!-- Title and Subtitle -->
<div class="text-center">
<p class="text-xs text-gray-400 font-medium">Sauzal</p>
<h1 class="text-xl font-bold text-gray-800">Pago</h1>
</div>
<!-- Menu Button -->
<button aria-label="Menú" class="p-2">
<svg class="h-8 w-8 text-gray-700" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 8h16M4 16h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
<div class="flex justify-between items-center mt-8 px-1">
<h2 class="text-lg font-semibold text-gray-600">Método de pago</h2>
<button class="text-yellow-500 font-medium text-sm">Agregar tarjeta</button>
</div>
</header>
<!-- END: Header -->
<!-- BEGIN: CardSection -->
<section class="px-6 py-4" data-purpose="payment-card">
<div class="card-gradient-bg w-full aspect-[1.6/1] rounded-3xl p-6 text-white shadow-xl flex flex-col justify-between">
<div class="card-circle-pattern"></div>
<div class="card-circle-pattern-inner"></div>
<!-- Card Logo (Mastercard) -->
<div class="flex justify-center items-center relative z-10">
<div class="flex -space-x-3">
<div class="w-8 h-8 rounded-full bg-red-500 opacity-90"></div>
<div class="w-8 h-8 rounded-full bg-yellow-500 opacity-90"></div>
</div>
</div>
<!-- Card Number (Vertical Style) -->
<div class="flex space-x-6 text-lg font-medium tracking-widest relative z-10 mt-2">
<div class="flex flex-col items-center"><span>5</span><span>1</span><span>2</span><span>3</span></div>
<div class="flex flex-col items-center"><span>4</span><span>3</span><span>2</span><span>4</span></div>
<div class="flex flex-col items-center"><span>3</span><span>1</span><span>2</span><span>3</span></div>
<div class="flex flex-col items-center"><span>2</span><span>5</span><span>5</span><span>6</span></div>
</div>
</div>
</section>
<!-- END: CardSection -->
<!-- BEGIN: SummaryDetails -->
<section class="px-6 mt-4 flex-grow" data-purpose="payment-summary">
<div class="bg-white border border-gray-100 rounded-[32px] p-6 shadow-sm">
<!-- Subtotals -->
<div class="space-y-3 mb-6">
<div class="flex justify-between items-center">
<span class="text-gray-400 font-medium">Total</span>
<span class="text-gray-700 font-bold"><span class="text-xs align-top mr-1 font-normal text-gray-400">$</span>145.00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-gray-400 font-medium">IVA</span>
<span class="text-gray-700 font-bold"><span class="text-xs align-top mr-1 font-normal text-gray-400">$</span>11.60</span>
</div>
</div>
<hr class="border-gray-100 mb-6"/>
<!-- Input Fields -->
<div class="space-y-4">
<!-- Discount Code -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-white border border-gray-200 rounded-2xl text-gray-500 text-sm focus:ring-0 focus:border-gray-300 transition-all" placeholder="Aplicar código de descuento" type="text"/>
</div>
<!-- Tip Selection -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-white border border-gray-200 rounded-2xl text-gray-500 text-sm focus:ring-0 focus:border-gray-300 transition-all" placeholder="Agregar propina" type="text"/>
</div>
</div>
<hr class="border-gray-100 my-8"/>
<!-- Final Total -->
<div class="flex justify-between items-center">
<span class="text-lg font-bold text-gray-700">Total</span>
<span class="text-xl font-bold text-gray-900"><span class="text-xs align-top mr-1 font-bold text-yellow-500">$</span>156.60</span>
</div>
</div>
</section>
<!-- END: SummaryDetails -->
<!-- BEGIN: FooterAction -->
<footer class="p-6 bg-white" data-purpose="sticky-footer">
<div class="p-1.5 bg-gray-50 rounded-[40px] shadow-sm">
<button class="w-full bg-[#00703C] text-white py-5 rounded-[32px] font-bold text-lg hover:bg-emerald-800 transition-colors shadow-lg shadow-emerald-100/50">
          Pagar
        </button>
</div>
</footer>
<!-- END: FooterAction -->
</main>
<!-- END: MobileContainer -->
</body></html>
