<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Filtros de Comida</title>
<!-- Tailwind CSS v3 CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f3f4f6;
    }
  </style>
<style data-purpose="ui-elements">
    /* Custom styles for the range slider to mimic the UI */
    .slider-container {
      position: relative;
      height: 40px;
    }
    .slider-track {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #e5e7eb;
      transform: translateY(-50%);
    }
    .slider-track-active {
      position: absolute;
      top: 50%;
      left: 25%; /* Approx position for 60 */
      right: 25%; /* Approx position for 80 */
      height: 2px;
      background: #fbbf24;
      transform: translateY(-50%);
    }
    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      background: #ffffff;
      border: 4px solid #fbbf24;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .slider-tick {
      position: absolute;
      top: 50%;
      width: 1px;
      height: 8px;
      background: #d1d5db;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- BEGIN: MobileDeviceContainer -->
<!-- Mimics the mobile screen shown in the image -->
<div class="relative w-full max-w-[390px] h-[844px] bg-[#f9fafb] rounded-[40px] shadow-2xl overflow-hidden border-[8px] border-white">
<!-- BEGIN: BackgroundOverlay -->
<div class="absolute inset-0 bg-gray-400 bg-opacity-30 z-0">
<!-- Header background content -->
<div class="p-6 pt-12 opacity-40">
<div class="flex justify-between items-center mb-4">
<div class="flex items-center gap-2">
<svg class="w-4 h-4" fill="currentColor" viewbox="0 0 20 20"><path clip-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" fill-rule="evenodd"></path></svg>
<span class="font-medium text-sm">Gram Bistro</span>
</div>
<button class="p-2"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg></button>
</div>
<h1 class="text-2xl font-bold text-gray-800 mb-6">Choose the best dish for you</h1>
<div class="relative">
<input class="w-full h-12 rounded-2xl border-none bg-white shadow-sm pl-12" placeholder="Search" type="text"/>
<div class="absolute left-4 top-3.5 text-gray-400">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>
</div>
</div>
</div>
</div>
<!-- END: BackgroundOverlay -->
<!-- BEGIN: FiltersModal -->
<div class="absolute bottom-0 w-full h-[75%] bg-white rounded-t-[40px] shadow-lg z-10 flex flex-col px-8 py-6">
<!-- Modal Handle -->
<div class="w-32 h-1.5 bg-gray-200 rounded-full self-center mb-8"></div>
<h2 class="text-center text-lg font-semibold text-gray-700 mb-8" data-purpose="modal-title">Filtros</h2>
<!-- BEGIN: CategorySection -->
<section class="mb-8" data-purpose="filter-category">
<h3 class="text-[#6b7280] text-base font-medium mb-4">Seleccionar categoría</h3>
<div class="flex gap-3">
<button class="px-6 py-2.5 bg-[#FFC107] text-white rounded-2xl font-semibold shadow-sm text-sm">Comidas</button>
<button class="px-6 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Bebidas</button>
<button class="px-6 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Postres</button>
</div>
</section>
<!-- END: CategorySection -->
<!-- BEGIN: ProductTypeSection -->
<section class="mb-8" data-purpose="filter-product-type">
<h3 class="text-[#6b7280] text-base font-medium mb-4">Selccionar tipo de producto</h3>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Pizza</button>
<button class="px-5 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Hamburguesa</button>
<button class="px-5 py-2.5 bg-[#FFC107] text-white rounded-2xl font-semibold shadow-sm text-sm">Ensalada</button>
<button class="px-5 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Pollo</button>
<button class="px-5 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Asado</button>
<button class="px-5 py-2.5 border border-gray-200 text-gray-400 rounded-2xl font-medium text-sm">Desayuno</button>
</div>
</section>
<!-- END: ProductTypeSection -->
<!-- BEGIN: PriceRangeSection -->
<section class="mb-10" data-purpose="filter-price-range">
<h3 class="text-[#6b7280] text-base font-medium mb-6">Rango de precio</h3>
<div class="slider-container mx-2 mb-2">
<!-- Main Track -->
<div class="slider-track"></div>
<!-- Active Range Highlight -->
<div class="slider-track-active"></div>
<!-- Ticks -->
<div class="slider-tick" style="left: 0%;"></div>
<div class="slider-tick" style="left: 25%;"></div>
<div class="slider-tick" style="left: 50%;"></div>
<div class="slider-tick" style="left: 75%;"></div>
<div class="slider-tick" style="left: 100%;"></div>
<!-- Range Thumbs (Visual Representation) -->
<div class="slider-thumb" style="left: 25%;"></div>
<div class="slider-thumb" style="left: 75%;"></div>
</div>
<!-- Scale Labels -->
<div class="flex justify-between text-gray-400 text-sm font-medium px-1">
<span>50</span>
<span class="text-gray-600">60</span>
<span>70</span>
<span class="text-gray-600">80</span>
<span>90</span>
</div>
</section>
<!-- END: PriceRangeSection -->
<!-- BEGIN: FooterAction -->
<footer class="mt-auto pb-4">
<button class="w-full bg-[#006B3C] text-white py-4 rounded-2xl font-bold text-lg hover:bg-green-800 transition-colors shadow-lg active:scale-95 duration-75">
          Filtrar
        </button>
</footer>
<!-- END: FooterAction -->
</div>
<!-- END: FiltersModal -->
</div>
<!-- END: MobileDeviceContainer -->
</body></html>
